<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alice Console</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22c55e;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --danger: #ef4444;
      --line: #1f2937;
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 10%, #1e293b, #0b1020 60%);
      color: var(--text);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 16px;
    }
    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }
    h1 { margin: 0 0 12px 0; font-size: 26px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    input, button, textarea {
      border: 1px solid var(--line);
      background: #0b1222;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }
    button { cursor: pointer; }
    button.ok { background: #0f2d1a; border-color: #14532d; color: #bbf7d0; }
    button.warn { background: #3f1d1d; border-color: #7f1d1d; color: #fecaca; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #050a14;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      color: var(--muted);
      min-height: 90px;
    }
    .dialog-log {
      min-height: 180px;
      max-height: 320px;
      overflow-y: auto;
    }
    .dialog-input {
      width: 100%;
      min-height: 90px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Alice Operations Console</h1>

    <div class="panel">
      <div class="row">
        <input id="base" style="min-width: 320px" />
        <input id="token" style="min-width: 320px" placeholder="Bearer token" />
        <button onclick="refreshAll()" class="ok">Refresh</button>
      </div>
    </div>

    <div class="panel">
      <h3>Runtime</h3>
      <div class="row">
        <button class="warn" onclick="pause()">Pause</button>
        <button class="ok" onclick="resume()">Resume</button>
      </div>
      <pre id="runtime"></pre>
    </div>

    <div class="panel">
      <h3>Providers</h3>
      <pre id="providers"></pre>
    </div>

    <div class="panel">
      <h3>Todos (all)</h3>
      <pre id="todos"></pre>
    </div>

    <div class="panel">
      <h3>Todo Dialog</h3>
      <pre id="todo-dialog-log" class="dialog-log"></pre>
      <textarea id="todo-dialog-input" class="dialog-input" placeholder="Type what you need to do. Alice will create a todo with Codex-generated title."></textarea>
      <div class="row">
        <button id="todo-dialog-send" class="ok" onclick="sendTodoDialog()">Send</button>
      </div>
    </div>
  </div>

<script>
function headers() {
  const token = document.getElementById('token').value.trim();
  const h = {
    'Content-Type': 'application/json'
  };
  if (token) h['Authorization'] = `Bearer ${token}`;
  return h;
}

function normalizedBase() {
  const raw = document.getElementById('base').value.trim();
  return raw.replace(/\/$/, '');
}

function storeInputs() {
  localStorage.setItem('alice.base', document.getElementById('base').value.trim());
  localStorage.setItem('alice.token', document.getElementById('token').value.trim());
}

function loadInputs() {
  const defaultBase = (window.location.origin && window.location.origin !== 'null')
    ? window.location.origin
    : 'http://localhost:8000';
  document.getElementById('base').value = localStorage.getItem('alice.base') || defaultBase;
  document.getElementById('token').value = localStorage.getItem('alice.token') || '';
}

function renderResult(elId, result) {
  document.getElementById(elId).textContent = JSON.stringify(result, null, 2);
}

function appendTodoDialog(role, text) {
  const log = document.getElementById('todo-dialog-log');
  const ts = new Date().toLocaleTimeString();
  log.textContent += `[${ts}] ${role}: ${text}\\n`;
  log.scrollTop = log.scrollHeight;
}

function renderTodos(result) {
  if (!result.ok) {
    renderResult('todos', result);
    return;
  }
  const items = Array.isArray(result.data?.items) ? result.data.items : [];
  const counts = { pending: 0, in_progress: 0, done: 0, other: 0 };
  for (const item of items) {
    const status = item.status || 'other';
    if (status in counts) counts[status] += 1;
    else counts.other += 1;
  }
  const payload = {
    ok: true,
    status: result.status,
    url: result.url,
    summary: {
      total: items.length,
      pending: counts.pending,
      in_progress: counts.in_progress,
      done: counts.done,
      other: counts.other
    },
    items
  };
  renderResult('todos', payload);
}

async function api(path, options = {}) {
  const url = normalizedBase() + path;
  try {
    const res = await fetch(url, {
      ...options,
      headers: { ...headers(), ...(options.headers || {}) }
    });
    const text = await res.text();
    let parsed;
    try {
      parsed = JSON.parse(text);
    } catch {
      parsed = { raw: text };
    }
    if (!res.ok) {
      return { ok: false, status: res.status, url, error: parsed.detail || parsed.error || 'request failed', response: parsed };
    }
    return { ok: true, status: res.status, url, data: parsed };
  } catch (err) {
    return { ok: false, url, error: String(err), network: true };
  }
}

async function refreshAll() {
  storeInputs();
  renderResult('runtime', await api('/api/v1/runtime/status'));
  renderResult('providers', await api('/api/v1/providers/health'));
  renderTodos(await api('/api/v1/todos'));
}

async function pause() {
  storeInputs();
  await api('/api/v1/runtime/pause', { method: 'POST', body: JSON.stringify({ reason: 'manual from dashboard' })});
  await refreshAll();
}

async function resume() {
  storeInputs();
  await api('/api/v1/runtime/resume', { method: 'POST', body: '{}' });
  await refreshAll();
}

async function sendTodoDialog() {
  storeInputs();
  const message = document.getElementById('todo-dialog-input').value.trim();
  if (!message) return;
  const sendBtn = document.getElementById('todo-dialog-send');

  appendTodoDialog('You', message);
  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending...';
  const result = await streamTodoDialog(message);

  if (!result.ok) {
    appendTodoDialog('Alice', `Failed: ${result.error || 'unknown error'}`);
  }

  document.getElementById('todo-dialog-input').value = '';
  sendBtn.disabled = false;
  sendBtn.textContent = 'Send';
  await refreshAll();
}

async function streamTodoDialog(message) {
  const url = normalizedBase() + '/api/v1/todos/dialog/stream';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ message })
    });

    if (!res.ok || !res.body) {
      const text = await res.text();
      return { ok: false, error: `HTTP ${res.status}: ${text || 'stream unavailable'}` };
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let createdTodo = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      let idx = buffer.indexOf('\n\n');
      while (idx !== -1) {
        const chunk = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        const parsed = parseSseChunk(chunk);
        if (parsed) {
          const outcome = handleTodoDialogEvent(parsed.event, parsed.data);
          if (parsed.event === 'created' && parsed.data && parsed.data.todo) {
            createdTodo = parsed.data.todo;
          }
          if (outcome && outcome.ok === false) {
            return outcome;
          }
        }
        idx = buffer.indexOf('\n\n');
      }
    }

    return { ok: true, todo: createdTodo };
  } catch (err) {
    return { ok: false, error: String(err) };
  }
}

function parseSseChunk(chunk) {
  if (!chunk) return null;
  const lines = chunk.split('\n');
  let event = 'message';
  const dataLines = [];
  for (const line of lines) {
    if (line.startsWith('event:')) event = line.slice(6).trim();
    if (line.startsWith('data:')) dataLines.push(line.slice(5).trim());
  }
  if (!dataLines.length) return null;
  const dataText = dataLines.join('\n');
  try {
    return { event, data: JSON.parse(dataText) };
  } catch {
    return { event, data: { raw: dataText } };
  }
}

function handleTodoDialogEvent(event, data) {
  if (event === 'status') {
    appendTodoDialog('Alice', data.message || data.phase || '...');
    return { ok: true };
  }
  if (event === 'title') {
    appendTodoDialog('Alice', `Generated title: ${data.title} (${data.title_source})`);
    return { ok: true };
  }
  if (event === 'created') {
    const todo = data.todo || {};
    appendTodoDialog('Alice', `Created todo #${todo.id}: ${todo.title || '(no title)'}`);
    return { ok: true };
  }
  if (event === 'error') {
    return { ok: false, error: data.error || 'stream error' };
  }
  return { ok: true };
}

loadInputs();
document.getElementById('base').addEventListener('change', storeInputs);
document.getElementById('token').addEventListener('change', storeInputs);
document.getElementById('todo-dialog-input').addEventListener('keydown', (event) => {
  if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
    event.preventDefault();
    sendTodoDialog();
  }
});
refreshAll();
window.setInterval(refreshAll, 15000);
</script>
</body>
</html>
