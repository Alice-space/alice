repos:
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
        args: ["--line-length=100"]

  - repo: https://github.com/PyCQA/isort
    rev: 6.1.0
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=100"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy app tests
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: .venv/bin/pytest -q
        language: system
        pass_filenames: false
