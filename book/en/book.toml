[book]
authors = ["Alice Contributors"]
language = "en"
multilingual = false
src = "."
title = "Alice Docs"

[output.html]
mathjax-support = false
git-repository-url = "https://github.com/Alice-space/ALICE"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/Alice-space/ALICE/edit/dev/book/en/{path}"
site-url = "/ALICE/en/"
additional-js = ["../lang-switcher.js"]

[output.html.search]
limit-results = 20
use-boolean-and = true

[output.html.fold]
enable = true
level = 1

[rust]
edition = "2021"
